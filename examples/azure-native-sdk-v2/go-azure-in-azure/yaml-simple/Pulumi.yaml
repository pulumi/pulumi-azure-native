name: yaml-simple
runtime: yaml
description: A minimal Azure Native Pulumi YAML program
config:
  azure-native:location: northeurope
  rgId:
    type: string

variables:
  clientConfig:
    fn::invoke:
      function: azure-native:authorization:getClientConfig

resources:
  resourceGroup:
    type: azure-native:resources:ResourceGroup
    get:
      id: ${rgId}

  keyVault:
    type: azure-native:keyvault:Vault
    properties:
      resourceGroupName: ${resourceGroup.name}
      location: ${resourceGroup.location}
      properties:
        sku:
          family: A
          name: standard
        tenantId: ${clientConfig.tenantId}
        accessPolicies:
          - tenantId: ${clientConfig.tenantId}
            objectId: ${clientConfig.objectId}
            permissions:
              secrets:
                - get
                - list
                - set
                - delete

  secret:
    type: azure-native:keyvault:Secret
    properties:
      resourceGroupName: ${resourceGroup.name}
      vaultName: ${keyVault.name}
      properties:
        value: "MySecretValue"  # Replace with your secret value

outputs:
  keyVaultUri: ${keyVault.properties.vaultUri}
  secretId: ${secret.id}